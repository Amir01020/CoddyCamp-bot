services:
  mysql:
    image: mysql:8.0
    container_name: laptop-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-laptop_secret}
      MYSQL_DATABASE: ${DB_NAME:-laptop_tracker}
      TZ: ${TZ:-Europe/Moscow}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost', '-uroot', '-p$$MYSQL_ROOT_PASSWORD']
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s

  bot:
    build: .
    container_name: laptop-bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: ${DB_PASSWORD:-laptop_secret}
      DB_NAME: ${DB_NAME:-laptop_tracker}
      NODE_ENV: production
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
